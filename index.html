<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Temperature converter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-bg">
    
    <div class="status-bar">
      <div class="time">9:41</div>
      <div class="icons">📶 📡 🔋</div>
    </div>

    <main class="frame">
      <div class="card">
        <h1 class="title">Temperature converter</h1>

        <!-- INPUT -->
        <div class="row two-cols">
          <div class="col">
            <label class="label">Degrees</label>
            <input id="degrees" type="number" placeholder="Enter value" />
          </div>

          <!-- FROM -->
          <div class="col">
            <label class="label">From</label>
            <select id="from">
              <option value="c">Celsius</option>
              <option value="f">Fahrenheit</option>
              <option value="k">Kelvin</option>
            </select>
          </div>
        </div>

        <!-- TO -->
        <div class="row">
          <label class="label">To</label>
          <select id="to">
            <option value="f">Fahrenheit</option>
            <option value="c">Celsius</option>
            <option value="k">Kelvin</option>
          </select>
        </div>

        <!-- RESULT -->
        <div class="row">
          <label class="label">Result</label>
          <div id="result" class="result">—</div>
        </div>

        <div class="error" id="err"></div>

        <button id="convertBtn" class="convert-btn">Convert</button>

        <!-- DARK MODE -->
        <button id="darkBtn" class="convert-btn" style="margin-top:10px;">🌙 Dark Mode</button>

        <!-- HISTORY -->
        <div class="row">
          <label class="label">History</label>
          <ul id="history"></ul>
        </div>

      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
